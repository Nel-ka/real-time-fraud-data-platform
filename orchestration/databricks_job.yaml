resources:
  jobs:
    streaming_project:
      name: streaming_project
      schedule:
        quartz_cron_expression: 28 * * * * ?
        timezone_id: Asia/Calcutta
        pause_status: PAUSED

      tasks:
        - task_key: bronze_load
          notebook_task:
            notebook_path: /pipelines/streaming/bronze_stream
            source: WORKSPACE

        - task_key: silver_load
          depends_on:
            - task_key: bronze_load
          notebook_task:
            notebook_path: /pipelines/streaming/silver_stream
            source: WORKSPACE

        - task_key: gold_load
          depends_on:
            - task_key: silver_load
          notebook_task:
            notebook_path: /pipelines/streaming/gold_stream
            source: WORKSPACE

      queue:
        enabled: true

      performance_target: PERFORMANCE_OPTIMIZED